<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Quicksand:wght@300..700&family=Rancho&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Video Belajar</title>
  </head>
  <body>
    <!-- ini navbar -->
    <nav class="navbar">
      <div class="container">
        <div class="navbar-kiri">
          <img src="asset/Logo.png" alt="" />
        </div>
        <div class="navbar-kanan">
          <a href="index.html"><i class="fa-solid fa-angle-right"></i></a>
        </div>
      </div>
    </nav>

    <!-- ini form login -->
    <main class="login-register">
      <div class="container">
        <form action="" class="login">
          <div class="header-login">
            <h3>Pendaftaran Akun</h3>
            <p>Yuk, daftarkan akunmu sekarang juga!</p>
          </div>

          <!-- isi form register -->
          <div class="nama-lengkap">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" required/>
          </div>

          <div class="email">
            <label for="email">E-mail</label>
            <input type="email" id="email" required />
          </div>
          <div class="phone-number">
            <label for="phone">No. Hp</label>
            <div class="country-code">
              <select name="" id="">
                <option value="">+62</option>
                <option value="">+1</option>
                <option value="">+60</option>
              </select>
              <input type="tel" id="phone" required>
            </div>
          </div>
          <div class="password">
            <label for="password">Kata Sandi</label>
            <input type="password" id="password" required />
          </div>

          <div class="password-confirm">
            <label for="password-confirm">Konfirmasi Kata Sandi</label>
            <input type="password" id="password-confirm" required />
          </div>
          <a href="" class="forgot-password">Lupa Password?</a>

          <!-- button buat masuk dan ke register.html -->
          <div class="btn-login-page">
            <button type="submit">Masuk</button>
            <a href="register.html" class="btn-daftar">Daftar</a>
          </div>

          <!-- divider -->
          <div class="divider">
            <span>atau</span>
          </div>

          <!-- login pake google -->
          <a href="" class="btn-google">
            <i class="fa-brands fa-google"></i>
            <span>Masuk dengan Google</span>
          </a>
        </form>
      </div>
    </main>
  </body>
</html>
